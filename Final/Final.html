<!-- Final.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unstable Volume Interface</title>
  <link rel="stylesheet" href="Final.css">
</head>
<body>

  <div class="warning">
    AUDIO STABILIZATION SYSTEM ACTIVE
  </div>

  <div class="box">
    <h1>Volume Calibration Console</h1>

    <p class="smallText">
      Fast movements may result in emotional consequences.
    </p>

    <label for="slider">Desired Loudness:</label>

    <input type="range" id="slider" min="0" max="100" value="50">

    <div class="stats">
      <p>Requested Volume: <span id="chosen">50</span>%</p>
      <p>System Volume: <span id="actual">50</span>%</p>
      <p>Trust Score: <span id="trust">100</span>%</p>
    </div>

    <div class="fakeMeter">
      <div id="fakeFill"></div>
    </div>

    <button id="confirmBtn">CONFIRM VOLUME</button>

    <p id="message">System idle.</p>
  </div>
<button id="confirmBtn">CONFIRM VOLUME</button>

<p id="message">System idle.</p>

<p class="whiteoutWarning">
  Warning: screen may randomly white out during calibration.
</p>
  <script src="Final.js"></script>
</body>
</html>
