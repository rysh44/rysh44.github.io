<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bad Volume Slider</title>
  <link rel="stylesheet" href="Final.css">
</head>
<body>
  <div class="box">
    <h1>Bad Volume Slider</h1>

    <label for="slider">Set Volume:</label>
    <input type="range" id="slider" min="0" max="100" value="50">

    <p>Chosen Volume: <span id="chosen">50</span>%</p>
    <p>Actual Volume: <span id="actual">50</span>%</p>
    <p id="message">Waiting for input...</p>
  </div>

  <script src="Final.js"></script>
</body>
</html>
